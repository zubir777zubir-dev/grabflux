name: grabflux
description: Video Downloader App - YouTube, TikTok, Instagram
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  flutter_clipboard_manager: ^0.0.2
  permission_handler: ^11.3.0
  dio: ^5.4.3
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
